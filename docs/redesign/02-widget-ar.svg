يلية تثقيفية — ليست نصيحة طبية.</text><rect x="366" y="252" width="304" height="58" rx="16" fill="#F1EEE9"/><text x="656" y="276" font-size="12.5" fill="#1A1714" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">مرحبًا! أخبريني بأهم ما يشغل بشرتكِ</text><text x="656" y="294" font-size="12.5" fill="#1A1714" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">وسأقترح روتينًا بسيطًا من هذا المتجر.</text><rect x="606" y="326" width="64" height="28" rx="14" fill="#FFFFFF" stroke="#EFD9DE" stroke-width="1.2"/><text x="638" y="344" font-size="11.5" fill="#B75D6E" font-weight="600" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" direction="rtl">جفاف</text><rect x="534" y="326" width="64" height="28" rx="14" fill="#FFFFFF" stroke="#EFD9DE" stroke-width="1.2"/><text x="566" y="344" font-size="11.5" fill="#B75D6E" font-weight="600" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" direction="rtl">بهتان</text><rect x="448" y="326" width="78" height="28" rx="14" fill="#FFFFFF" stroke="#EFD9DE" stroke-width="1.2"/><text x="487" y="344" font-size="11.5" fill="#B75D6E" font-weight="600" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" direction="rtl">حساسية</text><rect x="330" y="370" width="260" height="32" rx="16" fill="#F6E9EC"/><text x="344" y="391" font-size="12.5" fill="#8A4250" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" direction="rtl">بشرتي ملتهبة ومؤلمة منذ أيام</text><rect x="330" y="420" width="340" height="98" rx="14" fill="#FFF6EF" stroke="#F0D9C8" stroke-width="1"/><rect x="667" y="420" width="3" height="98" rx="2" fill="#D2754B"/><path d="M652 436 l11 4 v9 c0 7 -5 11 -11 14 c-6 -3 -11 -7 -11 -14 v-9 z" fill="none" stroke="#D2754B" stroke-width="2"/><text x="634" y="450" font-size="12" fill="#7A3F25" font-weight="700" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">قد يحتاج هذا إلى مراجعة مختص.</text><text x="654" y="472" font-size="11.5" fill="#7A3F25" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">يمكنني تقديم إرشادات تجميلية عامة فقط،</text><text x="654" y="490" font-size="11.5" fill="#7A3F25" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">ويُفضّل مراجعة طبيب الجلدية للحالة.</text><text x="654" y="508" font-size="9" fill="#B08A76" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end">↑ red-flag → referral (output gate)</text><rect x="358" y="536" width="312" height="44" rx="16" fill="#F6E9EC"/><text x="656" y="563" font-size="11.5" fill="#8A4250" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">يمكنني مشاركة نصائح عامة للعناية بالبشرة.</text><rect x="380" y="594" width="290" height="40" rx="12" fill="#FFFFFF" stroke="rgba(20,17,16,0.14)" stroke-width="1"/><text x="656" y="619" font-size="12" fill="#A39B92" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="end" direction="rtl">اسأليني عن بشرتكِ…</text><rect x="330" y="594" width="40" height="40" rx="12" fill="#B75D6E"/><text x="350" y="620" font-size="18" fill="#fff" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">↑</text><text x="500" y="648" font-size="10" fill="#A39B92" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" direction="rtl">ليست نصيحة طبية · مشغّل بواسطة DermaGuru</text><rect x="308" y="748" width="210" height="50" rx="25" fill="url(#gRose)" filter="url(#fSoft)"/><path d="M490 766 C 491.26 771.74, 491.26 771.74, 497 773 C 491.26 774.26, 491.26 774.26, 490 780 C 488.74 774.26, 488.74 774.26, 483 773 C 488.74 771.74, 488.74 771.74, 490 766 Z" fill="#fff"/><text x="474" y="778" font-size="14" fill="#fff" font-weight="600" font-family="'Helve