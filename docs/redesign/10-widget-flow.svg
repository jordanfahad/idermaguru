eding</text><rect x="988" y="384" width="364" height="118" rx="14" fill="#FFF6EF" stroke="#F0D9C8" stroke-width="1"/><rect x="988" y="384" width="3" height="118" rx="2" fill="#CC6B3D"/><path d="M1010 406 l13 5 v11 c0 9 -6 14 -13 17 c-7 -3 -13 -8 -13 -17 v-11 z" fill="none" stroke="#CC6B3D" stroke-width="2"/><text x="1036" y="414" font-size="13" fill="#7A3F25" font-weight="700" font-family="'Helvetica Neue',Arial,sans-serif">This may need a professional.</text><text x="1006" y="438" font-size="11.5" fill="#7A3F25" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">I can only share general cosmetic</text><text x="1006" y="456" font-size="11.5" fill="#7A3F25" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">guidance — please see a dermatologist</text><text x="1006" y="474" font-size="11.5" fill="#7A3F25" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">for symptoms like these.</text><text x="1006" y="492" font-size="9" fill="#B08A76" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">Triage: REFER_CLINIC · no products shown</text><rect x="988" y="520" width="334" height="40" rx="14" fill="#F3EEE6"/><text x="1002" y="538" font-size="11.5" fill="#14110D" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">I can still share gentle daily-care</text><text x="1002" y="553" font-size="11.5" fill="#14110D" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">tips while you do. Want those?</text><text x="988" y="578" font-size="10.5" fill="#6E665C" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">Output gate also rewrites any diagnosis,</text><text x="988" y="594" font-size="10.5" fill="#6E665C" font-weight="400" font-family="'Helvetica Neue',Arial,sans-serif">“cure”, or guaranteed-result claims.</text><text x="72" y="814" font-size="12" fill="#3A332C" font-weight="600" font-family="'Helvetica Neue',Arial,sans-serif">Consent + a short questionnaire</text><text x="522" y="