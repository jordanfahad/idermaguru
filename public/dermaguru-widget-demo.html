<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DermaGuru widget — demo store</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
        color: #1c1a19;
        background: #faf8f5;
      }
      header { padding: 22px 24px; border-bottom: 1px solid rgba(20, 17, 15, 0.08); font-weight: 700; }
      main { max-width: 720px; margin: 0 auto; padding: 48px 24px 120px; }
      h1 { font-size: 30px; letter-spacing: -0.02em; }
      p { color: #5f5a54; line-height: 1.6; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
      .tile { background: #fff; border: 1px solid rgba(20, 17, 15, 0.08); border-radius: 16px; height: 150px; }
      code { background: #efece7; padding: 2px 6px; border-radius: 6px; font-size: 13px; }
    </style>
  </head>
  <body>
    <header>Demo Store · Skincare</header>
    <main>
      <h1>A calm storefront</h1>
      <p>
        This page simulates a merchant store. The DermaGuru advisor is embedded with a single
        <code>&lt;script&gt;</code> tag — it mounts as a Shadow-DOM web component in the corner, so the
        store's CSS and the widget's CSS never touch. Open it with the launcher.
      </p>
      <div class="grid">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
      </div>
    </main>

    <!-- The embed snippet a merchant pastes (no code, any theme): -->
    <script
      async
      src="/dermaguru-widget.js"
      data-tenant="ai-derma-guru"
      data-position="bottom-right"
      data-primary="#1f6f5c"
      data-locale="en"
    ></script>
  </body>
</html>
